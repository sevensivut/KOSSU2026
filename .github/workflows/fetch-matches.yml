name: Fetch Real-time Match Data

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fetch-matches:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch match data from football-data.org
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          echo "API Key (first 10 chars): ${FOOTBALL_API_KEY:0:10}"
          python scripts/fetch_matches.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Check if there are changes
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add data/matches.json
            git commit -m "Update match data from football-data.org - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
