name: Update match data

on:
  push:
    paths:
      - "data/raw.json"
      - "scripts/compute-scores.js"
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes (optional live updates)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    concurrency:
      group: match-data
      cancel-in-progress: true

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Run scoring engine
      - name: Compute scores
        run: node scripts/compute-scores.js

      # 4. Commit and push updated JSON
      - name: Commit updated data
        run: |
          git config user.name "kossu-bot"
          git config user.email "bot@users.noreply.github.com"

          git add data/matches.json

          git commit -m "update: scores $(date -u +'%Y-%m-%dT%H:%MZ')" || echo "No changes"

          git pull --rebase origin main
          git push origin main
