name: Update Match Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and process match data
        env:
          BZZOIRO_KEY: ${{ secrets.BZZOIRO_KEY }}
        run: python3 scripts/fetch_matches.py

      - name: Commit if changed
        run: |
          git config user.name  "kossu-bot"
          git config user.email "kossu-bot@users.noreply.github.com"
          git add data/matches.json
          git diff --staged --quiet \
            && echo "No changes." \
            || (git commit -m "data: $(date -u +%Y-%m-%dT%H:%MZ)" && git push)
