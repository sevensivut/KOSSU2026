<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSSU 2026 - MM-Vetämispeli</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a0e0a;
            color: #f0e6d3;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            margin-bottom: 30px;
            background: linear-gradient(180deg, #2c1810 0%, #1a0e0a 100%);
            border-radius: 16px;
            border: 1px solid rgba(210, 180, 140, 0.15);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '🍾';
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 120px;
            opacity: 0.04;
            transform: rotate(15deg);
        }

        .header::after {
            content: '⚽';
            position: absolute;
            bottom: -30px;
            left: -20px;
            font-size: 100px;
            opacity: 0.04;
            transform: rotate(-10deg);
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700 0%, #f0a500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 8px;
            position: relative;
        }

        .header .subtitle {
            color: #b8956a;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .header .pot-display {
            display: inline-block;
            background: rgba(255, 215, 0, 0.06);
            padding: 12px 32px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            font-size: 0.95rem;
            color: #ffd700;
            font-weight: 600;
        }

        .header .pot-display span {
            color: #fff;
            font-weight: 700;
        }

        /* ===== STATUS BAR ===== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            margin-bottom: 24px;
            background: rgba(44, 24, 16, 0.6);
            border-radius: 10px;
            border: 1px solid rgba(210, 180, 140, 0.08);
            font-size: 0.85rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-bar .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-bar .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-bar .status .dot.online {
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.3);
        }

        .status-bar .status .dot.offline {
            background: #f44336;
            box-shadow: 0 0 8px rgba(244, 67, 54, 0.3);
        }

        .status-bar .last-updated {
            color: #8a7a6a;
        }

        /* ===== STATS GRID ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(44, 24, 16, 0.5);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(210, 180, 140, 0.06);
            transition: border-color 0.3s;
        }

        .stat-card:hover {
            border-color: rgba(210, 180, 140, 0.15);
        }

        .stat-card .value {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffd700;
            line-height: 1.2;
        }

        .stat-card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8a7a6a;
            margin-top: 4px;
        }

        /* ===== MATCHES ===== */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 20px;
        }

        .section-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffd700;
            letter-spacing: 1px;
        }

        .section-header .filter-group {
            display: flex;
            gap: 8px;
        }

        .section-header .filter-group button {
            padding: 6px 16px;
            border: 1px solid rgba(210, 180, 140, 0.15);
            border-radius: 20px;
            background: transparent;
            color: #8a7a6a;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .section-header .filter-group button:hover {
            border-color: rgba(210, 180, 140, 0.3);
            color: #f0e6d3;
        }

        .section-header .filter-group button.active {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
            color: #ffd700;
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .match-card {
            background: rgba(44, 24, 16, 0.4);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(210, 180, 140, 0.06);
            transition: all 0.3s;
            cursor: default;
        }

        .match-card:hover {
            border-color: rgba(210, 180, 140, 0.15);
            transform: translateY(-2px);
        }

        .match-card .date {
            font-size: 0.75rem;
            color: #8a7a6a;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .match-card .teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .match-card .team {
            flex: 1;
            text-align: center;
        }

        .match-card .team .name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #f0e6d3;
            margin-bottom: 2px;
        }

        .match-card .vs {
            color: #4a3a2a;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .match-card .score {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffd700;
            text-align: center;
            padding: 4px 0;
        }

        .match-card .score .dash {
            color: #4a3a2a;
            margin: 0 6px;
        }

        .match-card .status-badge {
            display: inline-block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .match-card .status-badge.finished {
            background: rgba(76, 175, 80, 0.15);
            color: #81c784;
        }

        .match-card .status-badge.live {
            background: rgba(255, 152, 0, 0.15);
            color: #ffb74d;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .match-card .status-badge.scheduled {
            background: rgba(100, 100, 100, 0.15);
            color: #8a7a6a;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .match-card .result-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 4px;
            margin-top: 6px;
        }

        .match-card .result-badge.home {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
        }

        .match-card .result-badge.away {
            background: rgba(255, 215, 0, 0.05);
            color: #b8956a;
        }

        .match-card .result-badge.draw {
            background: rgba(200, 200, 200, 0.05);
            color: #aaa;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #4a3a2a;
            grid-column: 1 / -1;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        .debug-info {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 0.8rem;
            color: #8a7a6a;
            overflow-x: auto;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header .subtitle {
                font-size: 0.85rem;
                letter-spacing: 2px;
            }

            .header .pot-display {
                font-size: 0.8rem;
                padding: 8px 20px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-card .value {
                font-size: 1.6rem;
            }

            .matches-grid {
                grid-template-columns: 1fr;
            }

            .status-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
                font-size: 0.75rem;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .section-header .filter-group {
                flex-wrap: wrap;
            }

            .match-card .team .name {
                font-size: 0.85rem;
            }

            .match-card .score {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 400px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .stat-card {
                padding: 14px;
            }

            .stat-card .value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <h1>🍾 KOSSU 2026</h1>
            <p class="subtitle">Jalkapallon MM-Vetämispeli</p>
            <div class="pot-display">
                💰 Potti: <span id="totalPot">0.00 €</span> &nbsp;·&nbsp; 🍾 12 pulloa Koskenkorvaa
            </div>
        </header>

        <!-- STATUS BAR -->
        <div class="status-bar">
            <div class="status">
                <span class="dot online" id="statusDot"></span>
                <span id="statusText">Yhdistetty</span>
            </div>
            <div class="last-updated">
                🕐 Päivitetty: <span id="lastUpdate">-</span>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="totalMatches">0</div>
                <div class="label">Ottelut yhteensä</div>
            </div>
            <div class="stat-card">
                <div class="value" id="playedMatches">0</div>
                <div class="label">Pelatut</div>
            </div>
            <div class="stat-card">
                <div class="value" id="remainingMatches">0</div>
                <div class="label">Tulossa</div>
            </div>
            <div class="stat-card">
                <div class="value" id="playerCount">0</div>
                <div class="label">Osallistujat</div>
            </div>
        </div>

        <!-- MATCHES -->
        <div class="section-header">
            <h2>📅 Ottelut</h2>
            <div class="filter-group">
                <button class="active" data-filter="all" onclick="filterMatches('all')">Kaikki</button>
                <button data-filter="live" onclick="filterMatches('live')">🔴 Live</button>
                <button data-filter="finished" onclick="filterMatches('finished')">Pelatut</button>
                <button data-filter="upcoming" onclick="filterMatches('upcoming')">Tulossa</button>
            </div>
        </div>

        <div class="matches-grid" id="matchesGrid">
            <div class="empty-state">
                <div class="icon">⚽</div>
                <p>Ladataan otteluita...</p>
            </div>
        </div>

        <!-- DEBUG INFO -->
        <div class="debug-info" id="debugInfo"></div>

        <!-- FOOTER -->
        <div style="text-align: center; padding: 30px 0 10px; color: #3a2a1a; font-size: 0.75rem; border-top: 1px solid rgba(210, 180, 140, 0.05);">
            KOSSU 2026 &bull; Koskenkorva &bull; Jalkapallon MM-kisat
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const TOTAL_PLAYERS = 12;
        const BET_AMOUNT = 17.79;
        const TOTAL_POT = TOTAL_PLAYERS * BET_AMOUNT;

        let allMatches = [];
        let currentFilter = 'all';
        let dataLoaded = false;

        // ===== DOM REFS =====
        const $ = (id) => document.getElementById(id);
        const matchesGrid = $('matchesGrid');
        const totalMatches = $('totalMatches');
        const playedMatches = $('playedMatches');
        const remainingMatches = $('remainingMatches');
        const playerCount = $('playerCount');
        const totalPot = $('totalPot');
        const lastUpdate = $('lastUpdate');
        const statusText = $('statusText');
        const statusDot = $('statusDot');
        const debugInfo = $('debugInfo');

        // ===== DEBUG HELPER =====
        function debugLog(message, data = null) {
            console.log(`[DEBUG] ${message}`, data || '');
            if (debugInfo) {
                debugInfo.style.display = 'block';
                const entry = document.createElement('div');
                entry.textContent = typeof message === 'string' ? message : JSON.stringify(message);
                if (data) {
                    entry.textContent += ' ' + (typeof data === 'string' ? data : JSON.stringify(data, null, 2));
                }
                debugInfo.appendChild(entry);
                // Keep only last 20 entries
                while (debugInfo.children.length > 20) {
                    debugInfo.removeChild(debugInfo.firstChild);
                }
            }
        }

        // ===== LOAD DATA =====
        async function loadData() {
            debugLog('🔄 Loading data...');
            
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`data/matches.json?t=${timestamp}`);

                debugLog(`📡 Response status: ${response.status}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const rawText = await response.text();
                debugLog(`📄 Raw data length: ${rawText.length} characters`);
                
                // Show first 200 chars for debugging
                debugLog(`📄 First 200 chars: ${rawText.substring(0, 200)}...`);

                // Parse JSON
                let data;
                try {
                    data = JSON.parse(rawText);
                    debugLog('✅ JSON parsed successfully');
                } catch (e) {
                    debugLog('❌ JSON parse error:', e.message);
                    throw new Error(`JSON parse error: ${e.message}`);
                }

                // Check data structure
                debugLog('📊 Data keys:', Object.keys(data));
                
                if (!data.matches) {
                    debugLog('❌ No "matches" key found in data');
                    throw new Error('Data missing "matches" field');
                }

                if (!Array.isArray(data.matches)) {
                    debugLog('❌ "matches" is not an array:', typeof data.matches);
                    throw new Error('"matches" is not an array');
                }

                debugLog(`📊 Matches count: ${data.matches.length}`);

                if (data.matches.length === 0) {
                    debugLog('⚠️ No matches in data');
                    throw new Error('No matches in data');
                }

                // Log first match structure
                debugLog('📊 First match keys:', Object.keys(data.matches[0]));
                debugLog('📊 First match sample:', data.matches[0]);

                // Map the data to our format
                allMatches = data.matches.map((match, index) => {
                    // Handle different possible field names
                    const mapped = {
                        id: match.id || index + 1,
                        date: match.date || match.utcDate || new Date().toISOString(),
                        homeTeam: match.homeTeam || match.homeTeamName || match.home_team_name || 'Tuntematon',
                        awayTeam: match.awayTeam || match.awayTeamName || match.away_team_name || 'Tuntematon',
                        status: match.status || 'SCHEDULED',
                        score: {
                            home: match.score?.home ?? match.homeScore ?? match.home_score ?? null,
                            away: match.score?.away ?? match.awayScore ?? match.away_score ?? null
                        },
                        result: match.result || null
                    };
                    
                    // Debug first few matches
                    if (index < 3) {
                        debugLog(`Match ${index + 1} mapped:`, mapped);
                    }
                    
                    return mapped;
                });

                dataLoaded = true;

                // Update last update time
                if (data.updatedAt) {
                    const d = new Date(data.updatedAt);
                    lastUpdate.textContent = d.toLocaleString('fi-FI', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                } else {
                    lastUpdate.textContent = new Date().toLocaleString('fi-FI');
                }

                // Update status
                setStatus(true, `${allMatches.length} ottelua ladattu`);
                debugLog(`✅ Successfully loaded ${allMatches.length} matches`);

                // Render everything
                renderStats();
                renderMatches(currentFilter);

            } catch (error) {
                debugLog('❌ Error loading data:', error.message);
                console.error('Virhe ladattaessa dataa:', error);
                setStatus(false, error.message);
                
                // Show error
                allMatches = [];
                dataLoaded = false;
                renderStats();
                
                matchesGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>Dataa ei voitu ladata</p>
                        <p style="font-size:0.8rem; color:#6a4a3a; margin-top:8px;">${error.message}</p>
                        <button onclick="loadData()" style="margin-top:16px; padding:8px 24px; background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.2); border-radius:8px; color:#ffd700; cursor:pointer;">Yritä uudelleen</button>
                    </div>
                `;
            }
        }

        // ===== RENDER STATS =====
        function renderStats() {
            const total = allMatches.length;
            const played = allMatches.filter(m => m.status === 'FINISHED').length;
            const live = allMatches.filter(m => m.status === 'IN_PLAY' || m.status === 'LIVE').length;
            const upcoming = allMatches.filter(m => m.status === 'SCHEDULED' || m.status === 'TIMED').length;

            totalMatches.textContent = total;
            playedMatches.textContent = played;
            remainingMatches.textContent = upcoming + live;
            playerCount.textContent = TOTAL_PLAYERS;
            totalPot.textContent = TOTAL_POT.toFixed(2) + ' €';
        }

        // ===== RENDER MATCHES =====
        function renderMatches(filter) {
            debugLog(`🔄 Rendering matches with filter: "${filter}", dataLoaded: ${dataLoaded}, count: ${allMatches.length}`);
            
            if (!dataLoaded || allMatches.length === 0) {
                matchesGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚽</div>
                        <p>Ei otteluita näytettäväksi</p>
                        <p style="font-size:0.8rem; color:#6a4a3a; margin-top:8px;">Dataa ei ole vielä ladattu</p>
                    </div>
                `;
                return;
            }

            const filtered = allMatches.filter(m => {
                if (filter === 'all') return true;
                if (filter === 'live') return m.status === 'IN_PLAY' || m.status === 'LIVE';
                if (filter === 'finished') return m.status === 'FINISHED';
                if (filter === 'upcoming') return m.status === 'SCHEDULED' || m.status === 'TIMED';
                return true;
            });

            debugLog(`📊 Filtered matches: ${filtered.length} of ${allMatches.length}`);

            if (filtered.length === 0) {
                matchesGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>Ei otteluita tällä suodattimella</p>
                    </div>
                `;
                return;
            }

            // Build HTML
            let html = '';
            filtered.forEach((m, index) => {
                try {
                    const date = new Date(m.date);
                    const dateStr = date.toLocaleString('fi-FI', {
                        day: 'numeric', month: 'short',
                        hour: '2-digit', minute: '2-digit'
                    });

                    const isFinished = m.status === 'FINISHED';
                    const isLive = m.status === 'IN_PLAY' || m.status === 'LIVE';
                    const isScheduled = m.status === 'SCHEDULED' || m.status === 'TIMED';

                    let statusClass = 'scheduled';
                    let statusLabel = '📅 Tulossa';
                    if (isFinished) { statusClass = 'finished'; statusLabel = '✅ Pelattu'; }
                    if (isLive) { statusClass = 'live'; statusLabel = '🔴 Live'; }

                    // Result
                    let resultHtml = '';
                    if (isFinished && m.score.home !== null && m.score.home !== undefined && m.score.away !== null && m.score.away !== undefined) {
                        const home = m.score.home;
                        const away = m.score.away;
                        let resultClass = 'draw';
                        let resultLabel = '🤝 Tasapeli';
                        if (home > away) { resultClass = 'home'; resultLabel = '🏠 Koti voitto'; }
                        if (away > home) { resultClass = 'away'; resultLabel = '✈️ Vieras voitto'; }
                        resultHtml = `<span class="result-badge ${resultClass}">${resultLabel}</span>`;
                    }

                    // Score display
                    let scoreHtml = '';
                    if (isFinished || isLive) {
                        const h = m.score.home !== null && m.score.home !== undefined ? m.score.home : '-';
                        const a = m.score.away !== null && m.score.away !== undefined ? m.score.away : '-';
                        scoreHtml = `
                            <div class="score">
                                ${h}<span class="dash">–</span>${a}
                            </div>
                        `;
                    } else {
                        scoreHtml = `<div class="score" style="color:#4a3a2a; font-size:0.9rem;">vs</div>`;
                    }

                    // Clean team names (remove flags if they exist)
                    let homeName = String(m.homeTeam || 'Tuntematon').replace(/[🇦-🇿]/g, '').trim();
                    let awayName = String(m.awayTeam || 'Tuntematon').replace(/[🇦-🇿]/g, '').trim();
                    
                    // If names are empty, use original
                    if (!homeName) homeName = String(m.homeTeam || 'Tuntematon');
                    if (!awayName) awayName = String(m.awayTeam || 'Tuntematon');

                    html += `
                        <div class="match-card" data-status="${m.status}">
                            <div class="date">${dateStr}</div>
                            <div class="teams">
                                <div class="team">
                                    <div class="name">${homeName}</div>
                                </div>
                                <div class="vs">vs</div>
                                <div class="team">
                                    <div class="name">${awayName}</div>
                                </div>
                            </div>
                            ${scoreHtml}
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                                <span class="status-badge ${statusClass}">${statusLabel}</span>
                                ${resultHtml}
                            </div>
                        </div>
                    `;
                } catch (err) {
                    debugLog(`❌ Error rendering match ${index}:`, err.message);
                }
            });

            matchesGrid.innerHTML = html;
            debugLog(`✅ Rendered ${filtered.length} matches`);
        }

        // ===== FILTER =====
        function filterMatches(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-group button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            renderMatches(filter);
        }

        // ===== STATUS =====
        function setStatus(online, message = '') {
            if (online) {
                statusDot.className = 'dot online';
                statusText.textContent = message || 'Yhdistetty';
                statusText.style.color = '#81c784';
            } else {
                statusDot.className = 'dot offline';
                statusText.textContent = `Virhe: ${message || 'ei yhteyttä'}`;
                statusText.style.color = '#ef9a9a';
            }
        }

        // ===== AUTO-REFRESH =====
        let refreshInterval = null;

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                loadData();
            }, 2 * 60 * 1000);
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            // Show debug info
            debugInfo.style.display = 'block';
            debugLog('🚀 KOSSU 2026 initialized');
            loadData();
            startAutoRefresh();
        });
    </script>
</body>
</html>
