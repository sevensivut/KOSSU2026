<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSSU 2026 - MM-Veto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a0e0a;
            color: #f0e6d3;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 40px 20px 30px;
            margin-bottom: 30px;
            background: linear-gradient(180deg, #2c1810 0%, #1a0e0a 100%);
            border-radius: 16px;
            border: 1px solid rgba(210, 180, 140, 0.15);
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700 0%, #f0a500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .header .subtitle {
            color: #b8956a;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .header .pot-display {
            display: inline-block;
            background: rgba(255, 215, 0, 0.06);
            padding: 12px 32px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            font-size: 0.95rem;
            color: #ffd700;
            font-weight: 600;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            margin-bottom: 24px;
            background: rgba(44, 24, 16, 0.6);
            border-radius: 10px;
            border: 1px solid rgba(210, 180, 140, 0.08);
            font-size: 0.85rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-bar .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-bar .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-bar .status .dot.online {
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.3);
        }

        .status-bar .status .dot.offline {
            background: #f44336;
            box-shadow: 0 0 8px rgba(244, 67, 54, 0.3);
        }

        .status-bar .last-updated {
            color: #8a7a6a;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(44, 24, 16, 0.5);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(210, 180, 140, 0.06);
            transition: border-color 0.3s;
        }

        .stat-card:hover {
            border-color: rgba(210, 180, 140, 0.15);
        }

        .stat-card .value {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffd700;
            line-height: 1.2;
        }

        .stat-card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8a7a6a;
            margin-top: 4px;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tabs button {
            padding: 12px 24px;
            background: transparent;
            border: 2px solid rgba(210, 180, 140, 0.15);
            border-radius: 8px;
            color: #8a7a6a;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .tabs button:hover {
            border-color: rgba(210, 180, 140, 0.3);
            color: #f0e6d3;
        }

        .tabs button.active {
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffd700;
            color: #ffd700;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 0 20px 0;
        }

        .section-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffd700;
            letter-spacing: 1px;
        }

        .section-header .filter-group {
            display: flex;
            gap: 8px;
        }

        .section-header .filter-group button {
            padding: 6px 16px;
            border: 1px solid rgba(210, 180, 140, 0.15);
            border-radius: 20px;
            background: transparent;
            color: #8a7a6a;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .section-header .filter-group button:hover {
            border-color: rgba(210, 180, 140, 0.3);
            color: #f0e6d3;
        }

        .section-header .filter-group button.active {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
            color: #ffd700;
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .match-card {
            background: rgba(44, 24, 16, 0.4);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(210, 180, 140, 0.06);
            transition: all 0.3s;
        }

        .match-card:hover {
            border-color: rgba(210, 180, 140, 0.15);
            transform: translateY(-2px);
        }

        .match-card .date {
            font-size: 0.75rem;
            color: #8a7a6a;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .match-card .teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .match-card .team {
            flex: 1;
            text-align: center;
        }

        .match-card .team .name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #f0e6d3;
        }

        .match-card .vs {
            color: #4a3a2a;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .match-card .score {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffd700;
            text-align: center;
            padding: 4px 0;
        }

        .match-card .score .dash {
            color: #4a3a2a;
            margin: 0 6px;
        }

        .match-card .status-badge {
            display: inline-block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .match-card .status-badge.finished {
            background: rgba(76, 175, 80, 0.15);
            color: #81c784;
        }

        .match-card .status-badge.scheduled {
            background: rgba(100, 100, 100, 0.15);
            color: #8a7a6a;
        }

        .match-card .result-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 4px;
            margin-top: 6px;
        }

        .match-card .result-badge.home {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
        }

        .match-card .result-badge.away {
            background: rgba(255, 215, 0, 0.05);
            color: #b8956a;
        }

        .match-card .result-badge.draw {
            background: rgba(200, 200, 200, 0.05);
            color: #aaa;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            background: rgba(44, 24, 16, 0.4);
            border-radius: 12px;
            overflow: hidden;
        }

        .leaderboard-table th {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .leaderboard-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(210, 180, 140, 0.05);
        }

        .leaderboard-table tr:hover td {
            background: rgba(255, 215, 0, 0.03);
        }

        .leaderboard-table .rank {
            font-weight: 700;
            color: #8a7a6a;
        }

        .leaderboard-table .rank-1 { color: #ffd700; }
        .leaderboard-table .rank-2 { color: #c0c0c0; }
        .leaderboard-table .rank-3 { color: #cd7f32; }

        .leaderboard-table .player-name {
            font-weight: 600;
            color: #f0e6d3;
        }

        .leaderboard-table .points {
            font-weight: 700;
            color: #ffd700;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #4a3a2a;
            grid-column: 1 / -1;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .medals-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .medal-card {
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(210, 180, 140, 0.1);
            background: rgba(44, 24, 16, 0.4);
        }

        .medal-card.gold { border-color: rgba(255, 215, 0, 0.3); }
        .medal-card.silver { border-color: rgba(192, 192, 192, 0.3); }
        .medal-card.bronze { border-color: rgba(205, 127, 50, 0.3); }

        .medal-card h3 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: #ffd700;
        }

        .medal-card .medal-winners {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .medal-card .medal-winner {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            font-weight: 500;
        }

        .medal-card.gold .medal-winner { color: #ffd700; }
        .medal-card.silver .medal-winner { color: #c0c0c0; }
        .medal-card.bronze .medal-winner { color: #cd7f32; }

        .predictions-list {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(210, 180, 140, 0.1);
            font-size: 0.75rem;
            color: #8a7a6a;
        }

        .predictions-list .pred {
            display: inline-block;
            margin: 2px 4px 2px 0;
            padding: 2px 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .medals-section {
                grid-template-columns: 1fr;
            }
            .tabs button {
                flex: 1;
                min-width: 80px;
                text-align: center;
                font-size: 0.85rem;
                padding: 10px 16px;
            }
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .header h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 400px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .stat-card {
                padding: 14px;
            }
            .stat-card .value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🍾 KOSSU 2026</h1>
            <p class="subtitle">Jalkapallon MM-Veto</p>
            <div class="pot-display">
                💰 Potti: <span id="totalPot">213.48 €</span> &nbsp;·&nbsp; 🍾 12 pulloa Koskenkorvaa
            </div>
        </header>

        <div class="status-bar">
            <div class="status">
                <span class="dot online" id="statusDot"></span>
                <span id="statusText">Ladataan...</span>
            </div>
            <div class="last-updated">
                🕐 Päivitetty: <span id="lastUpdate">-</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="totalMatches">0</div>
                <div class="label">Ottelut</div>
            </div>
            <div class="stat-card">
                <div class="value" id="playedMatches">0</div>
                <div class="label">Pelatut</div>
            </div>
            <div class="stat-card">
                <div class="value" id="remainingMatches">0</div>
                <div class="label">Tulossa</div>
            </div>
            <div class="stat-card">
                <div class="value" id="playerCount">12</div>
                <div class="label">Osallistujat</div>
            </div>
        </div>

        <div class="tabs">
            <button class="active" data-tab="matches" onclick="switchTab('matches')">📅 Ottelut</button>
            <button data-tab="leaderboard" onclick="switchTab('leaderboard')">🏆 Pistelista</button>
            <button data-tab="predictions" onclick="switchTab('predictions')">📊 Veikkaukset</button>
        </div>

        <div id="tab-matches" class="tab-content active">
            <div class="section-header">
                <h2>📅 Ottelut</h2>
                <div class="filter-group">
                    <button class="active" data-filter="all" onclick="filterMatches('all')">Kaikki</button>
                    <button data-filter="finished" onclick="filterMatches('finished')">Pelatut</button>
                    <button data-filter="scheduled" onclick="filterMatches('scheduled')">Tulossa</button>
                </div>
            </div>
            <div class="matches-grid" id="matchesGrid">
                <div class="empty-state"><div class="icon">⚽</div><p>Ladataan...</p></div>
            </div>
        </div>

        <div id="tab-leaderboard" class="tab-content">
            <h2 style="color:#ffd700; margin-bottom:20px;">🏆 Pistelista</h2>
            <div style="overflow-x:auto;">
                <table class="leaderboard-table" id="leaderboardTable">
                    <thead>
                        <tr>
                            <th>Sija</th>
                            <th>Pelaaja</th>
                            <th>Pisteet</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-predictions" class="tab-content">
            <h2 style="color:#ffd700; margin-bottom:20px;">📊 Pelaajien Veikkaukset</h2>
            <div class="matches-grid" id="predictionsGrid">
                <div class="empty-state"><div class="icon">📊</div><p>Ladataan...</p></div>
            </div>
        </div>

        <div style="text-align: center; padding: 30px 0 10px; color: #3a2a1a; font-size: 0.75rem; border-top: 1px solid rgba(210, 180, 140, 0.05);">
            KOSSU 2026 🍾
        </div>
    </div>

    <script>
        // ===== DATA =====
        let allData = null;
        let currentFilter = 'all';
        let currentTab = 'matches';

        // ===== DOM REFS =====
        const $ = (id) => document.getElementById(id);

        // ===== LOAD DATA =====
        async function loadData() {
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`data/matches.json?t=${timestamp}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                allData = await response.json();
                console.log('✅ Data loaded:', allData);
                
                updateStats();
                renderMatches('all');
                renderLeaderboard();
                renderPredictions();
                
                $('statusText').textContent = `${allData.matches.length} ottelua`;
                $('lastUpdate').textContent = new Date().toLocaleString('fi-FI');
                $('statusDot').className = 'dot online';
                
            } catch (error) {
                console.error('❌ Error:', error);
                $('statusText').textContent = 'Virhe: ' + error.message;
                $('statusDot').className = 'dot offline';
            }
        }

        // ===== UPDATE STATS =====
        function updateStats() {
            if (!allData) return;
            
            const total = allData.matches.length;
            const played = allData.matches.filter(m => m.status === 'FINISHED').length;
            const scheduled = allData.matches.filter(m => m.status === 'SCHEDULED').length;
            
            $('totalMatches').textContent = total;
            $('playedMatches').textContent = played;
            $('remainingMatches').textContent = scheduled;
            $('playerCount').textContent = allData.players ? allData.players.length : 12;
        }

        // ===== RENDER MATCHES =====
        function renderMatches(filter) {
            if (!allData) return;
            
            const filtered = allData.matches.filter(m => {
                if (filter === 'all') return true;
                return m.status === filter.toUpperCase();
            });
            
            if (filtered.length === 0) {
                $('matchesGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>Ei otteluita</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            filtered.forEach(m => {
                const date = new Date(m.date);
                const dateStr = date.toLocaleString('fi-FI', {
                    day: 'numeric', month: 'short',
                    hour: '2-digit', minute: '2-digit'
                });
                
                const isFinished = m.status === 'FINISHED';
                const isScheduled = m.status === 'SCHEDULED';
                
                let statusClass = 'scheduled';
                let statusLabel = '📅 Tulossa';
                if (isFinished) { statusClass = 'finished'; statusLabel = '✅ Pelattu'; }
                
                let scoreHtml = '';
                if (isFinished && m.score) {
                    const h = m.score.home !== null ? m.score.home : '-';
                    const a = m.score.away !== null ? m.score.away : '-';
                    scoreHtml = `
                        <div class="score">
                            ${h}<span class="dash">–</span>${a}
                        </div>
                    `;
                } else {
                    scoreHtml = `<div class="score" style="color:#4a3a2a; font-size:0.9rem;">vs</div>`;
                }
                
                let resultHtml = '';
                if (isFinished && m.result) {
                    let resultClass = 'draw';
                    let resultLabel = '🤝 Tasapeli';
                    if (m.result === '1') { resultClass = 'home'; resultLabel = '🏠 Koti voitto'; }
                    if (m.result === '2') { resultClass = 'away'; resultLabel = '✈️ Vieras voitto'; }
                    resultHtml = `<span class="result-badge ${resultClass}">${resultLabel}</span>`;
                }
                
                // Show predictions count
                const predCount = m.predictions ? Object.keys(m.predictions).length : 0;
                const predHtml = predCount > 0 ? `<div style="font-size:0.7rem;color:#8a7a6a;margin-top:8px;">📊 ${predCount} veikkausta</div>` : '';
                
                html += `
                    <div class="match-card">
                        <div class="date">${dateStr}</div>
                        <div class="teams">
                            <div class="team"><div class="name">${m.homeTeam}</div></div>
                            <div class="vs">vs</div>
                            <div class="team"><div class="name">${m.awayTeam}</div></div>
                        </div>
                        ${scoreHtml}
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                            <span class="status-badge ${statusClass}">${statusLabel}</span>
                            ${resultHtml}
                        </div>
                        ${predHtml}
                    </div>
                `;
            });
            
            $('matchesGrid').innerHTML = html;
        }

        // ===== RENDER LEADERBOARD =====
        function renderLeaderboard() {
            if (!allData || !allData.players) return;
            
            // Calculate scores from predictions
            const scores = {};
            allData.players.forEach(p => scores[p] = 0);
            
            allData.matches.forEach(m => {
                if (m.status === 'FINISHED' && m.result && m.predictions) {
                    Object.entries(m.predictions).forEach(([player, pred]) => {
                        if (pred === m.result) {
                            scores[player] = (scores[player] || 0) + 1;
                        }
                    });
                }
            });
            
            const sorted = allData.players
                .map(p => ({ name: p, points: scores[p] || 0 }))
                .sort((a, b) => b.points - a.points);
            
            let html = '';
            sorted.forEach((p, i) => {
                let rankClass = '';
                if (i === 0) rankClass = 'rank-1';
                else if (i === 1) rankClass = 'rank-2';
                else if (i === 2) rankClass = 'rank-3';
                
                html += `
                    <tr>
                        <td class="rank ${rankClass}">${i + 1}</td>
                        <td class="player-name">${p.name}</td>
                        <td class="points">${p.points}</td>
                    </tr>
                `;
            });
            
            $('leaderboardBody').innerHTML = html;
        }

        // ===== RENDER PREDICTIONS =====
        function renderPredictions() {
            if (!allData) return;
            
            const playedMatches = allData.matches.filter(m => m.status === 'FINISHED' && m.predictions);
            
            if (playedMatches.length === 0) {
                $('predictionsGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📊</div>
                        <p>Ei pelattuja otteluita vielä</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            playedMatches.slice(0, 10).forEach(m => {
                const date = new Date(m.date);
                const dateStr = date.toLocaleString('fi-FI', {
                    day: 'numeric', month: 'short'
                });
                
                const preds = Object.entries(m.predictions || {});
                if (preds.length === 0) return;
                
                html += `
                    <div class="match-card">
                        <div class="date">${dateStr}</div>
                        <div class="teams">
                            <div class="team"><div class="name">${m.homeTeam}</div></div>
                            <div class="vs">vs</div>
                            <div class="team"><div class="name">${m.awayTeam}</div></div>
                        </div>
                        <div style="text-align:center;color:#ffd700;font-weight:700;margin:6px 0;">
                            Tulos: ${m.score?.home ?? '-'}–${m.score?.away ?? '-'}
                        </div>
                        <div class="predictions-list">
                            ${preds.map(([player, pred]) => 
                                `<span class="pred">${player}: ${pred}</span>`
                            ).join('')}
                        </div>
                    </div>
                `;
            });
            
            $('predictionsGrid').innerHTML = html;
        }

        // ===== FILTER =====
        function filterMatches(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-group button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            renderMatches(filter);
        }

        // ===== TAB SWITCHING =====
        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.tabs button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            $(`tab-${tab}`).classList.add('active');
        }

        // ===== AUTO REFRESH =====
        let refreshInterval = setInterval(loadData, 120000);

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
