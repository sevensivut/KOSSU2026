<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOSHUVEIKKA 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="hero">
  <h1>KOSHUVEIKKA <span>2026</span></h1>
  <p>MM-veikkaus</p>

  <div id="updatedAt" class="updated">
    Ladataan...
  </div>
</header>

<section class="stats" id="stats"></section>

<nav class="tabs">
  <button class="tab active" data-tab="leaderboard">Sarjataulukko</button>
  <button class="tab" data-tab="matches">Ottelut</button>
  <button class="tab" data-tab="awards">Palkinnot</button>
</nav>

<main>

<section id="leaderboard" class="tab-content"></section>

<section id="matches" class="tab-content hidden">
  <div class="search-wrap">
    <input
      type="text"
      id="teamSearch"
      placeholder="Hae joukkuetta..."
    >
  </div>

  <div id="matchesList"></div>
</section>

<section id="awards" class="tab-content hidden">
  <div id="awardsGrid"></div>
</section>

</main>

<div id="errorBox" class="error hidden"></div>

<script src="assets/app.js"></script>

</body>
</html>
